name: Kafka Practice CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 소스 코드 가져오기
        uses: actions/checkout@v4

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Maven wrapper 실행 권한 부여
        run: chmod +x ./mvnw

      - name: 테스트 실행
        run: ./mvnw clean verify
